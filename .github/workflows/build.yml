name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build container image
        run: podman build -f Containerfile -t ${{ env.IMAGE }}:latest .

      - name: Push container image
        run: podman push ${{ env.IMAGE }}:latest

  disk-image:
    needs: build
    uses: ./.github/workflows/disk-image.yml
    permissions:
      contents: write
      packages: read
