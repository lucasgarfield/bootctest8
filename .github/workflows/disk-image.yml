name: Disk image

on:
  workflow_dispatch:
  workflow_call:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af

      - name: Pull container image
        run: sudo podman pull ${{ env.IMAGE }}:latest

      - name: Build disk image
        run: |
          mkdir -p output
          sudo podman run \
            --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --rootfs ext4 \
            ${{ env.IMAGE }}:latest

      - name: Rename disk image
        run: sudo mv output/qcow2/disk.qcow2 output/disk.qcow2

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes || true
          gh release create latest output/disk.qcow2 \
            --title "Latest disk image" \
            --notes "Built from the latest container image on $(date -u +%Y-%m-%d)." \
            --latest
