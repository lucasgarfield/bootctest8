name: ISO installer

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af

      - name: Build installer container
        run: |
          sudo podman build \
            --build-arg IMAGE=${{ env.IMAGE }}:latest \
            -f Containerfile.installer \
            -t localhost/installer:latest .

      - name: Build ISO
        run: |
          mkdir -p output
          sudo podman run \
            --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type bootc-installer \
            --rootfs ext4 \
            --installer-payload-ref ${{ env.IMAGE }}:latest \
            localhost/installer:latest

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest-iso --yes || true
          gh release create latest-iso output/bootiso/install.iso \
            --title "Latest ISO installer" \
            --notes "Installer ISO built on $(date -u +%Y-%m-%d). Flash to USB and boot to install." \
            --prerelease
